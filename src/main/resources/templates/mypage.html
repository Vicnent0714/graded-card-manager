<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{mypage.title}">マイページ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Noto Sans JP',sans-serif;
            background-color:#f8f9fa;
            padding:2rem;
            padding-bottom:96px;
        }

        .app-title{
            font-weight:700;
            color:#2c3e50;
        }

        .btn-primary{
            background-color:rgb(44, 100, 248);
            border:none;
        }
        .btn-primary:hover{
            background-color:rgb(25, 80, 210);
        }
        .btn{ border-radius:10px; }

        .btn-action{
            padding:10px 14px;
            font-weight:600;
            line-height:1.1;
        }

        .profile-card{
            background:#fff;
            border:1px solid #e5e7eb;
            border-radius:12px;
        }

        .avatar{
            width:56px;height:56px;border-radius:50%;
            background:#e5e7eb;
            display:flex;align-items:center;justify-content:center;
            font-size:22px;font-weight:800;color:#6b7280;
            flex:0 0 auto;
        }

        .kv{
            background:#f9fafb;
            border:1px solid #eef2f7;
            border-radius:12px;
            padding:12px 14px;
        }
        .label{
            color:#6b7280;
            font-size:.85rem;
            margin-bottom:4px;
        }
        .value{
            font-weight:700;
            color:#111827;
        }

        .form-control,.form-select{ border-radius:10px; }

        .hint{
            color:#6b7280;
            font-size:.85rem;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="app-title mb-0" th:text="#{mypage.title}">マイページ</h2>

        <div class="d-flex align-items-center gap-2">
            <a href="/cards" class="btn btn-outline-secondary btn-action shadow-sm">
                <span th:text="#{mypage.backSimple}">カード一覧</span>
            </a>

            <a th:if="${!editMode}" th:href="@{/mypage(edit=true)}"
               class="btn btn-primary btn-action shadow-sm"
               th:text="#{mypage.edit}">編集</a>

            <a th:if="${editMode}" th:href="@{/mypage}"
               class="btn btn-outline-secondary btn-action shadow-sm"
               th:text="#{mypage.cancel}">キャンセル</a>
        </div>
    </div>

    <div th:if="${errorKey != null}" class="alert alert-danger">
        <span th:text="#{${errorKey}}">入力内容を確認してください。</span>
    </div>

    <div class="card shadow-sm border-0 profile-card">
        <div class="card-body p-4">

            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="avatar">
                    <span th:text="${#strings.substring(user.username,0,1).toUpperCase()}">U</span>
                </div>

                <div class="flex-grow-1">
                    <div class="fw-bold fs-5 lh-sm" th:text="${user.username}">username</div>
                    <div class="text-muted" th:text="${user.email}">email</div>
                </div>
            </div>

            <!-- 表示モード -->
            <div th:if="${!editMode}">
                <div class="row g-3">

                    <div class="col-md-6">
                        <div class="kv">
                            <div class="label" th:text="#{mypage.username}">ユーザー名</div>
                            <div class="value" th:text="${user.username}">vincent0714</div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="kv">
                            <div class="label" th:text="#{mypage.email}">メール</div>
                            <div class="value" th:text="${user.email}">xxx@xx.com</div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="kv">
                            <div class="label" th:text="#{mypage.country}">国</div>
                          
							<div class="value"
							     th:text="${user.country == null || user.country == ''} ? #{mypage.unset} : #{${'country.' + user.country}}">
							  未設定
							</div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="kv">
                            <div class="label" th:text="#{mypage.birthDate}">生年月日</div>
                            <div class="value"
                                 th:text="${user.birthDate == null} ? #{mypage.unset} : ${user.birthDate}">
                                未設定
                            </div>
                        </div>
                    </div>

                </div>

                <div class="hint mt-3" th:text="#{mypage.hint}">
                    ※ 編集ボタンからプロフィールを更新できます。
                </div>
            </div>

           
            <div th:if="${editMode}">
                <form method="post" action="/mypage" class="mt-2" id="mypageForm">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <div class="label" th:text="#{mypage.username}">ユーザー名</div>
                            <input class="form-control" name="username" th:value="${user.username}" required>
                        </div>

                        <div class="col-md-6">
                            <div class="label" th:text="#{mypage.email}">メール</div>
                            <input class="form-control" type="email" name="email" th:value="${user.email}" required>
                        </div>

                   
						<div class="col-md-6">
						  <div class="label" th:text="#{mypage.country}">国</div>

						  <select class="form-select" name="country">
						    <option value="" th:selected="${user.country == null || user.country == ''}" th:text="#{mypage.unset}">未設定</option>

						    <option value="Japan" th:selected="${user.country == 'Japan'}">日本（Japan）</option>
						    <option value="China" th:selected="${user.country == 'China'}">中国（China）</option>
						    <option value="Korea" th:selected="${user.country == 'Korea'}">韓国（Korea）</option>
						    <option value="Singapore" th:selected="${user.country == 'Singapore'}">シンガポール（Singapore）</option>
						    <option value="Malaysia" th:selected="${user.country == 'Malaysia'}">マレーシア（Malaysia）</option>
						    <option value="Thailand" th:selected="${user.country == 'Thailand'}">タイ（Thailand）</option>
						    <option value="Indonesia" th:selected="${user.country == 'Indonesia'}">インドネシア（Indonesia）</option>
						    <option value="United Kingdom" th:selected="${user.country == 'United Kingdom'}">イギリス（United Kingdom）</option>
						    <option value="Germany" th:selected="${user.country == 'Germany'}">ドイツ（Germany）</option>
						    <option value="France" th:selected="${user.country == 'France'}">フランス（France）</option>
						    <option value="Italy" th:selected="${user.country == 'Italy'}">イタリア（Italy）</option>
						    <option value="Spain" th:selected="${user.country == 'Spain'}">スペイン（Spain）</option>
						    <option value="United States" th:selected="${user.country == 'United States'}">アメリカ（United States）</option>
						    <option value="Canada" th:selected="${user.country == 'Canada'}">カナダ（Canada）</option>
						    <option value="Australia" th:selected="${user.country == 'Australia'}">オーストラリア（Australia）</option>
						    <option value="New Zealand" th:selected="${user.country == 'New Zealand'}">ニュージーランド（New Zealand）</option>

						    <option value="Other" th:selected="${user.country == 'Other'}">その他（Other）</option>
						  </select>
						</div>

                       
                        <div class="col-md-6">
                            <div class="label" th:text="#{mypage.birthDate}">生年月日</div>

                            <div class="d-flex gap-2">
                                <select id="birthYear" class="form-select" style="max-width:33%;">
                                    <option value="">年</option>
                                    <option th:each="y : ${#numbers.sequence(1950, 2030)}"
                                            th:value="${y}" th:text="${y} + ' 年'"></option>
                                </select>

                                <select id="birthMonth" class="form-select" style="max-width:33%;">
                                    <option value="">月</option>
                                    <option th:each="m : ${#numbers.sequence(1, 12)}"
                                            th:value="${m}" th:text="${m} + ' 月'"></option>
                                </select>

                                <select id="birthDay" class="form-select" style="max-width:33%;">
                                    <option value="">日</option>
                                    <option th:each="d : ${#numbers.sequence(1, 31)}"
                                            th:value="${d}" th:text="${d} + ' 日'"></option>
                                </select>
                            </div>

                            <input type="hidden" name="birthDate" id="birthDateHidden">
                            <div class="hint mt-2" th:text="#{mypage.hintEdit}">
                                ※ 生年月日は選択して保存します。
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button class="btn btn-primary btn-action shadow-sm" type="submit" th:text="#{mypage.save}">保存</button>
                        <a class="btn btn-outline-secondary btn-action shadow-sm" th:href="@{/mypage}" th:text="#{mypage.cancel}">キャンセル</a>
                    </div>
                </form>
            </div>

        </div>
    </div>

</div>


<script th:inline="javascript">
(function () {
    const birth = /*[[${user.birthDate}]]*/ null;

    const ySel = document.getElementById('birthYear');
    const mSel = document.getElementById('birthMonth');
    const dSel = document.getElementById('birthDay');
    const hidden = document.getElementById('birthDateHidden');

    if (!ySel || !mSel || !dSel || !hidden) return;

    function pad2(n){ return String(n).padStart(2,'0'); }

   
    if (birth) {
        const s = String(birth);
        if (s.includes('-')) {
            const parts = s.split('-');
            if (parts.length === 3) {
                ySel.value = parts[0];
                mSel.value = String(parseInt(parts[1], 10));
                dSel.value = String(parseInt(parts[2], 10));
            }
        }
    }

    function syncHidden(){
        const y = ySel.value;
        const m = mSel.value;
        const d = dSel.value;

        if (!y || !m || !d) {
            hidden.value = '';
            return;
        }
        hidden.value = y + '-' + pad2(m) + '-' + pad2(d);
    }

    ySel.addEventListener('change', syncHidden);
    mSel.addEventListener('change', syncHidden);
    dSel.addEventListener('change', syncHidden);


    syncHidden();

    document.getElementById('mypageForm')?.addEventListener('submit', syncHidden);
})();
</script>

</body>
</html>
