<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規登録 - 鑑定カード管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { padding: 2rem; }

        .btn-primary{
            background-color: rgb(44, 100, 248);
            border: none;
        }
        .btn-primary:hover{
            background-color: rgb(25, 80, 210);
        }

        .card{
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .form-control, .form-select{
            border-radius: 10px;
        }

        .page-title{
            font-weight: 800;
            color: #2c3e50;
            letter-spacing: .2px;
        }
    </style>
</head>

<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4 page-title">新規ユーザー登録</h3>

                    <div th:if="${error}"
                         class="alert alert-danger text-center"
                         th:text="${error}">
                    </div>

                    <form action="/signup" method="post">

                        <div class="mb-3">
                            <label class="form-label">ユーザー名</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">パスワード</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">メールアドレス</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">生年月日</label>
                            <div class="d-flex gap-2">
                                <select name="birthYear" class="form-select" style="max-width: 33%;" required>
                                    <option value="">年</option>
                                    <option th:each="y : ${#numbers.sequence(1950, 2026)}"
                                            th:value="${y}" th:text="${y} + ' 年'"></option>
                                </select>

                                <select name="birthMonth" class="form-select" style="max-width: 33%;" required>
                                    <option value="">月</option>
                                    <option th:each="m : ${#numbers.sequence(1, 12)}"
                                            th:value="${m}" th:text="${m} + ' 月'"></option>
                                </select>

                                <select name="birthDay" class="form-select" style="max-width: 33%;" required>
                                    <option value="">日</option>
                                    <option th:each="d : ${#numbers.sequence(1, 31)}"
                                            th:value="${d}" th:text="${d} + ' 日'"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">国籍（Country）</label>
                            <select name="country" class="form-select" required>
                                <option value="Japan">日本（Japan）</option>
                                <option value="China">中国（China）</option>
                                <option value="Korea">韓国（Korea）</option>
                                <option value="Singapore">シンガポール（Singapore）</option>
                                <option value="Malaysia">マレーシア（Malaysia）</option>
                                <option value="Thailand">タイ（Thailand）</option>
                                <option value="Indonesia">インドネシア（Indonesia）</option>
                                <option value="United Kingdom">イギリス（United Kingdom）</option>
                                <option value="Germany">ドイツ（Germany）</option>
                                <option value="France">フランス（France）</option>
                                <option value="Italy">イタリア（Italy）</option>
                                <option value="Spain">スペイン（Spain）</option>
                                <option value="United States">アメリカ（United States）</option>
                                <option value="Canada">カナダ（Canada）</option>
                                <option value="Australia">オーストラリア（Australia）</option>
                                <option value="New Zealand">ニュージーランド（New Zealand）</option>
                                <option value="Other">その他（Other）</option>
                            </select>
                        </div>

                        <button class="btn btn-primary w-100 mt-2">登録する</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/login">ログイン画面へ戻る</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
