<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.title}">鑑定カード管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8f9fa;
            padding: 2rem;
            padding-bottom: 96px;
        }
        .page-wrap {
            max-width: 1550px;
            margin: 0 auto;
        }
        .app-title {
            font-weight: 700;
            color: #2c3e50;
        }
        .btn-primary {
            background-color: rgb(44, 100, 248);
            border: none;
        }
        .btn-primary:hover {
            background-color: rgb(25, 80, 210);
        }
        .btn { border-radius: 10px; }
        .btn-action {
            padding: 10px 14px;
            font-weight: 600;
            line-height: 1.1;
        }
        .tool-bar {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 14px;
        }
        .form-control { border-radius: 10px; }
        .tool-bar .input-group .form-control {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .tool-bar .input-group .btn {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            border-width: 2px;
        }
        .table-wrap {
            overflow-x: auto;
        }
        .table {
            table-layout: fixed;
            width: 100%;
            min-width: 1460px;
            background-color: #ffffff !important;
            margin-bottom: 0;
        }
        .table td { vertical-align: middle; }
        .card-name {
            white-space: normal !important;
            word-break: break-word;
            overflow-wrap: anywhere;
            max-width: 380px;
            line-height: 1.5;
        }
        .card-thumb {
            max-width: 60px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background-color: #ffffff;
        }
        .company-cell,
        .operation-cell {
            text-align: left;
            padding-left: 10px;
        }
        .text-muted.small {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .total-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            border-top: 1px solid #e5e7eb;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.06);
            padding: 12px 0;
            z-index: 1050;
        }
        .total-label {
            color: #6b7280;
            font-size: 0.9rem;
        }
        .total-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #111827;
            line-height: 1.1;
        }
        .total-sub {
            color: #6b7280;
            font-size: 0.85rem;
        }
        .lang-pill {
            position: fixed;
            right: 24px;
            bottom: 120px;
            z-index: 1100;
        }
        .lang-pill-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            color: #374151;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            user-select: none;
        }
        .lang-pill-btn:hover { border-color: #9ca3af; }
        .lang-pill-menu {
            position: absolute;
            right: 0;
            bottom: 46px;
            width: 160px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
            overflow: hidden;
            display: none;
        }
        .lang-pill.open .lang-pill-menu { display: block; }
        .lang-pill-menu a {
            display: block;
            padding: 10px 14px;
            font-size: 0.9rem;
            color: #374151;
            text-decoration: none;
        }
        .lang-pill-menu a:hover { background: #f3f4f6; }
        .lang-caret {
            display: inline-block;
            transition: transform .15s ease;
        }
        .lang-pill.open .lang-caret {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="app-title mb-0" th:text="#{app.title}">鑑定カード管理システム</h2>
        <div class="d-flex align-items-center gap-2">
            <button type="button" class="btn btn-danger btn-action shadow-sm" id="btnBulkDelete" style="display: none;">
                🗑 一括削除
            </button>
            <a href="/cards/add" class="btn btn-primary btn-action shadow-sm" th:text="#{menu.add}">＋ 新規登録</a>
            <div class="dropdown">
                <button class="btn btn-outline-secondary btn-action dropdown-toggle shadow-sm" type="button" data-bs-toggle="dropdown" th:text="#{menu.menu}">
                    メニュー
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/mypage">マイページ</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="/logout" th:text="#{menu.logout}">ログアウト</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="tool-bar mb-3">
        <form method="get" action="/cards">
            <div class="input-group">
                <div style="position: relative; flex: 1 1 auto;">
                    <input type="text" class="form-control" name="keyword" id="searchInput"
                           th:placeholder="#{search.placeholder}"
                           th:value="${keyword}"
                           style="width: 100%; padding-right: 35px;">
                    <a href="/cards" id="clearBtn"
                       th:style="'position: absolute; right: 12px; top: 50%; transform: translateY(-50%); z-index: 100; color: #adb5bd; text-decoration: none; font-size: 1.2rem; line-height: 1; cursor: pointer; display: ' + (${keyword != null and keyword != ''} ? 'block' : 'none') + ';'"
                       onmouseover="this.style.color='#dc3545'"
                       onmouseout="this.style.color='#adb5bd'">
                       ✖
                    </a>
                </div>
                <button class="btn btn-outline-primary" type="submit" th:text="#{search.button}">検索</button>
            </div>
            <div class="text-muted small mt-1" th:text="#{search.hint}">※ 未入力なら全件表示</div>
        </form>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0 table-wrap">
            <form id="bulkDeleteForm" action="/cards/bulk-delete" method="post">
                <table class="table table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th style="width:40px;" class="text-center">
                            <input class="form-check-input" type="checkbox" id="selectAll" style="cursor: pointer;">
                        </th>
                        <th style="width:70px;" class="text-center">No</th>
                        <th style="width:120px;" class="text-center" th:text="#{table.image}">画像</th>
                        <th style="width:380px;" th:text="#{table.name}">名前</th>
                        <th style="width:180px;" th:text="#{table.company}">鑑定会社</th>
                        <th style="width:100px;" th:text="#{table.grade}">グレード</th>
                        <th style="width:150px;" th:text="#{table.price}">推定価格</th>
                        <th style="width:130px;">相場</th>
                        <th style="width:150px;" th:text="#{table.source}">入手経路</th>
                        <th style="width:140px;" th:text="#{table.action}">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="card, stat : ${cards}">
                        <td class="text-center">
                            <input class="form-check-input card-checkbox" type="checkbox" name="cardIds" th:value="${card.id}" style="cursor: pointer;">
                        </td>
                        <td class="text-center text-muted" th:text="${stat.index + 1}"></td>
                        <td class="text-center">
                            <img th:src="${card.imagePath == null || card.imagePath == 'default-card.jpg'}
                                         ? @{'/images/default-card.jpg'}
                                         : @{'/uploaded-images/' + ${card.imagePath}}"
                                 class="card-thumb">
                        </td>
                        <td class="fw-bold card-name" th:text="${card.name}"></td>
                        <td class="company-cell">
                            <span class="badge bg-danger" th:text="${card.company}"></span>
                            <div class="text-muted small" th:if="${card.certNumber != null}" th:text="'#' + ${card.certNumber}"></div>
                        </td>
                        <td class="fw-bold text-danger" th:text="${card.grade}"></td>
                        <td th:text="'¥' + ${card.price}"></td>
                        <td>
                            <div class="dropdown">
                                <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">相場</button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" th:href="@{|https://magi.camp/items/search?forms_search_items%5Bkeyword%5D=${(card.marketKeyword != null && !#strings.isEmpty(card.marketKeyword)) ? card.marketKeyword : card.name}|}" target="_blank" rel="noopener">Magi</a></li>
                                    <li><a class="dropdown-item" th:href="@{|https://jp.mercari.com/search?keyword=${(card.marketKeyword != null && !#strings.isEmpty(card.marketKeyword)) ? card.marketKeyword : card.name}|}" target="_blank" rel="noopener">Mercari</a></li>
                                    <li><a class="dropdown-item" th:href="@{|https://snkrdunk.com/search?keywords=${(card.marketKeyword != null && !#strings.isEmpty(card.marketKeyword)) ? card.marketKeyword : card.name}&page=1|}" target="_blank" rel="noopener">SNRKDUNK</a></li>
                                </ul>
                            </div>
                        </td>
                        <td th:text="${card.source}"></td>
                        <td class="operation-cell">
                            <div class="d-flex gap-2">
                                <a th:href="@{'/cards/edit/' + ${card.id}}" class="btn btn-sm btn-outline-primary" th:text="#{action.edit}">編集</a>
                                <button type="button" class="btn btn-sm btn-outline-danger" th:attr="onclick=|if(confirm('${#messages.msg('action.confirmDelete')}')) { window.location.href='/cards/delete-single/${card.id}'; }|" th:text="#{action.delete}">削除</button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(cards)}">
                        <td colspan="10" class="text-center py-5 text-muted">
                            <div th:text="#{nodata.title}">データがありません</div>
                            <div class="text-muted small mt-1" th:text="#{nodata.sub}"></div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </form>
        </div>
    </div>
</div>

<div class="total-bar">
    <div class="page-wrap d-flex justify-content-between align-items-center">
        <div>
            <div class="total-label" th:text="#{total.label}"></div>
            <div class="total-value" th:text="'¥' + ${totalPrice}"></div>
            <div class="total-sub">
                <span th:text="#{total.count}"></span>：<span th:text="${totalCount}"></span> <span th:text="#{total.unit}"></span>
            </div>
        </div>
        <a href="/cards" class="btn btn-primary btn-action" th:text="#{action.refresh}">更新</a>
    </div>
</div>

<div class="lang-pill" id="langPill">
    <div class="lang-pill-btn" id="langBtn">
        <span th:text="${#locale.language == 'ja' ? 'JA' : (#locale.language == 'zh' ? 'CN' : 'EN')}">JA</span>
        <span>Language</span>
        <span class="lang-caret">▾</span>
    </div>
    <div class="lang-pill-menu">
        <a th:href="@{/cards(lang='ja', keyword=${keyword})}">日本語</a>
        <a th:href="@{/cards(lang='zh', keyword=${keyword})}">中文</a>
        <a th:href="@{/cards(lang='en', keyword=${keyword})}">English</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    const pill = document.getElementById('langPill');
    const btn  = document.getElementById('langBtn');
    btn.addEventListener('click', function (e) {
        e.stopPropagation();
        pill.classList.toggle('open');
    });
    document.addEventListener('click', function () {
        pill.classList.remove('open');
    });

    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    if (searchInput && clearBtn) {
        searchInput.addEventListener('input', function() {
            clearBtn.style.display = this.value.trim() !== '' ? 'block' : 'none';
        });
    }

    const selectAllCheckbox = document.getElementById('selectAll');
    const cardCheckboxes = document.querySelectorAll('.card-checkbox');
    const btnBulkDelete = document.getElementById('btnBulkDelete');
    const bulkDeleteForm = document.getElementById('bulkDeleteForm');

    if (selectAllCheckbox && cardCheckboxes.length > 0) {
        selectAllCheckbox.addEventListener('change', function() {
            cardCheckboxes.forEach(cb => cb.checked = this.checked);
            toggleBulkDeleteBtn();
        });

        cardCheckboxes.forEach(cb => {
            cb.addEventListener('change', toggleBulkDeleteBtn);
        });

        btnBulkDelete.addEventListener('click', function() {
            if (confirm('選択したカードをすべて削除しますか？（この操作は取り消せません）')) {
                bulkDeleteForm.submit();
            }
        });

        function toggleBulkDeleteBtn() {
            const anyChecked = Array.from(cardCheckboxes).some(cb => cb.checked);
            btnBulkDelete.style.display = anyChecked ? 'block' : 'none';
            selectAllCheckbox.checked = Array.from(cardCheckboxes).every(cb => cb.checked);
        }
    }
})();
</script>
</body>
</html>
